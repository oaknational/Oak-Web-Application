query lessonDownloads(
  $lessonSlug: String!
  $programmeSlug: String!
  $unitSlug: String!
) {
  download_assets: published_mv_lesson_content_published_9_0_0(
    where: { lesson_slug: { _eq: $lessonSlug } }
  ) {
    has_slide_deck_asset_object
    has_worksheet_asset_object
    has_supplementary_asset_object
    has_worksheet_answers_asset_object
    has_worksheet_google_drive_downloadable_version
    has_lesson_guide_object
    starter_quiz
    exit_quiz
    is_legacy
    expired: deprecated_fields(path: "expired")
    geo_restricted
    login_required
    downloadable_files
    lesson_release_date
  }
  browse_data: published_mv_synthetic_unitvariant_lessons_by_keystage_18_0_0(
    where: {
      lesson_slug: { _eq: $lessonSlug }
      unit_slug: { _eq: $unitSlug }
      programme_slug: { _eq: $programmeSlug }
    }
  ) {
    lesson_slug
    unit_slug
    programme_slug
    programme_slug_by_year
    is_legacy
    lesson_data
    unit_data
    programme_fields
    actions
    features
    order_in_unit
  }
}
