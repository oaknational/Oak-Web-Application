name: "Playwright"
description: "Run Playwright E2E tests and upload the HTML report"

inputs:
  base_url:
    description: "The URL for Playwright to run against"
    required: true
  branch_name:
    description: "[optional] Branch name for report artifact naming"
    required: false
    default: ""
  vercel_bypass_secret:
    description: "[optional] Vercel automation bypass secret for protected preview deployments"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install Playwright browser binaries
      shell: bash
      run: pnpm exec playwright install --with-deps chromium

    - name: Run Playwright tests
      shell: bash
      run: pnpm run test:e2e:ci
      env:
        BASE_URL: ${{ inputs.base_url }}
        VERCEL_AUTOMATION_BYPASS_SECRET: ${{ inputs.vercel_bypass_secret }}

    - name: Build safe artifact suffix
      if: ${{ inputs.branch_name != '' }}
      shell: bash
      run: |
        safe_branch_name="$(printf '%s' "${{ inputs.branch_name }}" | tr '/\\:*?"<>|' '-')"
        echo "PLAYWRIGHT_ARTIFACT_SUFFIX=-${safe_branch_name}" >> "$GITHUB_ENV"

    - name: Upload Playwright report
      if: ${{ always() }}
      uses: actions/upload-artifact@v5
      with:
        name: playwright-report${{ env.PLAYWRIGHT_ARTIFACT_SUFFIX }}
        path: playwright-report/
        retention-days: 14
