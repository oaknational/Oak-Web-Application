name: "Playwright"
description: "Run Playwright E2E tests and upload the HTML report"

inputs:
  base_url:
    description: "The URL for Playwright to run against"
    required: true
  branch_name:
    description: "[optional] Branch name for report artifact naming"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install Playwright browser binaries
      shell: bash
      run: pnpm exec playwright install --with-deps chromium

    - name: Run Playwright tests
      shell: bash
      run: pnpm run test:e2e:ci
      env:
        BASE_URL: ${{ inputs.base_url }}
        VERCEL_AUTOMATION_BYPASS_SECRET: ${{ env.VERCEL_AUTOMATION_BYPASS_SECRET }}

    - name: Upload Playwright report
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report${{ inputs.branch_name != '' && format('-{0}', inputs.branch_name) || '' }}
        path: playwright-report/
        retention-days: 14
