name: Code checks

env:
  PUPPETEER_DOWNLOAD_PATH: /home/runner/.npm/chromium

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  merge_group:

jobs:
  check:
    name: lint, check types
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      # Check out full history so Sonar can identify PR changes.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Use Node.js
        uses: pnpm/action-setup@v6
        with:
          version: 10
          cache: true

      # Install.
      - run: pnpm ci --verbose

      # Check formatting adheres to our config.
      - run: pnpm run format:check

      # Lint.
      - run: pnpm run lint

      # Check types.
      - run: pnpm run check-types

  test:
    name: test, Sonar
    runs-on: 
      group: large-runners
    timeout-minutes: 60
    steps:
      # Check out full history so Sonar can identify PR changes.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Use Node.js
        uses: pnpm/action-setup@v6
        with:
          version: 10
          cache: true

      # Install.
      - run: pnpm ci --verbose

      # Unit tests, no integration tests.
      - run: pnpm run test:ci

      # Manually run the SonarCloud scan so we can send test coverage information.
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
